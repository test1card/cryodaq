# Physical alarms configuration — F-X v3
# CooldownAlarm (predictor-based trajectory deviation) and VacuumGuard (P×T guard).
# All values have hard-coded fallback defaults in module if this file is missing.
# Engine restart required to apply changes (no hot-reload).

cooldown:
  enabled: true
  eval_interval_s: 30

  # Trajectory deviation alarm (predictor-based)
  k_p: 2.5                          # progress σ multiplier (2.5σ deviation)
  sustained_min: 5                  # number of consecutive ticks before fire
  base_temp_K: 5.0                  # T_cold threshold below which alarm auto-disarms
  base_epsilon_K: 1.0               # ε in "T_cold > base + ε" guard against asymptotic noise

  # ETA slip — informational message in alarm body, not fire criterion
  eta_slip_window_min: 60           # 1h lookback for slip calculation
  eta_slip_message_threshold_h: 0.5 # only mention slip if > 30 min/hour drift

  # Auto-disarm criteria
  auto_disarm_progress: 0.95

  # v0.55.4 A1: engine auto-calls arm() when an experiment transitions
  # into the cooldown phase. Operator retains manual disarm via the
  # «Контроль захолаживания» footer button on the alarm panel.
  auto_arm: true

  # Watchdog mode — activated automatically after AUTO_DISARMED (cooldown complete).
  # Monitors T_cold against a fixed threshold; fires WARNING if T_cold climbs
  # above base_temp_K + watchdog_margin_K for watchdog_sustained_s seconds.
  # Clears when operator calls disarm() or experiment is finalized.
  #
  # Architect rule (2026-05-07): post-cooldown watchdog disabled by
  # default. If the system warms back up after settling, the
  # SteadyStatePredictor exits is_quasi_steady=True, CooldownAlarm
  # WATCHING resumes the deviation check, and the regular path catches
  # it — separate watchdog logic is no longer needed for the contest
  # demo. Single config flip restores it.
  watchdog_enabled: false
  watchdog_margin_K: 1.0             # Т12 threshold = base_temp_K + this (default 6.0 K)
  watchdog_sustained_s: 300          # seconds Т12 must stay above threshold before firing
  watchdog_level: WARNING

  # Channels (must match channels.yaml short IDs).
  # Hardware mapping verified by architect at lab 2026-05-03 (C6 resolved):
  #   Т11 — пассивная плита на 1-й ступени GM-cooler (~40K floor)
  #   Т12 — 2-я ступень GM-cooler, холодная точка (~2.9K floor)
  cold_channel: "Т12"
  warm_channel: "Т11"

  # Predictor model location (relative to repo root or absolute)
  predictor_model_path: "data/cooldown_model/predictor_model.json"

vacuum:
  enabled: true
  eval_interval_s: 30

  # Pressure channel as published by broker (Thyracont VSP63D_1)
  pressure_channel: "VSP63D_1/pressure"

  # Reference temperature channel for arm/disarm gating
  reference_temp_channel: "Т12"
  arm_threshold_K: 260.0            # T_ref < this → arm vacuum guard
  disarm_threshold_K: 270.0         # T_ref > this → disarm (10K hysteresis)

  # Pressure thresholds (mbar) with one-decade deadband
  fire_pressure_mbar: 1.0e-2
  clear_pressure_mbar: 1.0e-3
  sustained_s: 30                   # P > fire_pressure must persist this long

  severity: CRITICAL

  # On FIRED, also latch a SafetyManager fault (source OFF + FAULT_LATCHED),
  # not just the alarm. This is opt-in; if absent, alarm-only is the default.
  # unattended/cold runs need the source killed on a vacuum incident, not
  # just an alarm. No auto-clear on pressure recovery: the latch holds
  # through FAULT_LATCHED → acknowledge → MANUAL_RECOVERY so a vacuum
  # incident while cold always needs operator eyes. Set false for
  # attended/debug runs where alarm-only (no source kill) is acceptable.
  escalate_to_safety: true

# Channel landmarks — F-ChannelLandmarks (system-level, hardware-pinned).
# Т11 / Т12 are physically bolted to GM-cooler stages and never migrate
# between experiments. The query agent consults these aliases BEFORE
# experiment-level channels.yaml names so an operator phrase like
# "азотная плита" always resolves to Т11 even if a per-experiment alias
# happened to drift onto another channel.
landmarks:
  Т11:
    role: warm_stage
    physical: "1-я ступень GM-cooler, ~40K при работе"
    aliases:
      - "азотная плита"
      - "плита"
      - "плита 1-й ступени"
      - "первая ступень"
      - "первая ступень GM"
      - "1-я ступень"
      - "т warm"
      - "t warm"
      - "warm channel"
  Т12:
    role: cold_stage
    physical: "2-я ступень GM-cooler, ~2.9K при работе"
    aliases:
      - "вторая ступень"
      - "вторая ступень GM"
      - "2-я ступень"
      - "холодная точка"
      - "холодный палец"
      - "т cold"
      - "t cold"
      - "cold channel"
