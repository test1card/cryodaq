# ============================================================================
# CryoDAQ Alarm Configuration v3
# ============================================================================
#
# Криовакуумный стенд, проект Миллиметрон, АКЦ ФИАН
#
# Калиброванные датчики:  Т11 (2-я ступень, холодная точка, 3–8 K)
#                         Т12 (Азотная плита, 1-я ступень, 30–80 K)
# Остальные:              только fault-детекция (0 K / 350+ K)
#
# Физическое обоснование: alarm_tz_physics_v3.md
#
# ============================================================================

engine:
  poll_interval_s: 0.5
  rate_window_s: 120          # 240 точек при 2 Hz
  rate_min_points: 60         # минимум 30с данных
  rate_method: linear_fit

  setpoints:
    T12_setpoint:
      source: experiment_metadata   # SQLite → experiments.custom_fields → "T12_setpoint"
      default: 4.2                  # K
      unit: K

# --------------------------------------------------------------------------
# Группы каналов
# --------------------------------------------------------------------------
channel_groups:
  calibrated:    [Т11, Т12]
  # Т4 (Радиатор 2), Т8 (Калибровка) — отключённые датчики, исключены
  uncalibrated:  [Т1, Т2, Т3, Т5, Т6, Т7, Т9, Т10,
                  Т13, Т14, Т15, Т16, Т17, Т18, Т19, Т20]
  all_temp:      [Т1, Т2, Т3, Т5, Т6, Т7, Т9, Т10,
                  Т11, Т12, Т13, Т14, Т15, Т16, Т17, Т18, Т19, Т20]

# ============================================================================
# ГЛОБАЛЬНЫЕ АЛАРМЫ (работают при ЛЮБОЙ фазе)
# ============================================================================
global_alarms:

  # --- ГЛАВНЫЙ: потеря вакуума при холодном криостате ---
  vacuum_loss_cold:
    alarm_type: composite
    operator: AND
    conditions:
      - channels: [Т11, Т12]
        check: any_below
        threshold: 200           # K
      - channel: P1
        check: above
        threshold: 1.0e-3        # mbar — граница молекулярного режима
    level: CRITICAL
    hysteresis:
      pressure: 5.0e-4
    message: >
      ПОТЕРЯ ВАКУУМА ПРИ ХОЛОДНОМ КРИОСТАТЕ.
      Давление вышло из молекулярного режима (P > 1e-3 mbar) при T < 200K.
      ДЕЙСТВИЕ: проверить вакуумную систему, подготовить аварийный напуск N₂.
    notify: [gui, telegram, sound]

  # --- Ранний предвестник ---
  vacuum_loss_cold_early:
    alarm_type: composite
    operator: AND
    conditions:
      - channels: [Т11, Т12]
        check: any_below
        threshold: 200
      - channel: P1
        check: above
        threshold: 1.0e-4        # mbar — ещё безопасно, но аномально
      - channel: P1
        check: rate_above
        threshold: 0             # dP/dt > 0
        rate_window_s: 60
    level: WARNING
    message: >
      Давление растёт при холодном криостате (P > 1e-4 mbar).
      Возможна течь. ДЕЙСТВИЕ: проверить уплотнения, фланцы.
    notify: [gui, telegram]

  # --- Fault на некалиброванных датчиках ---
  sensor_fault:
    alarm_type: threshold
    channel_group: uncalibrated
    check: outside_range
    range: [0.0, 350.0]         # K — hardcoded, ниже 0 или выше 350 = неисправность
    level: WARNING
    message: >
      Датчик {channel}: {value} K — вне диапазона 0–350 K.
      Обрыв / КЗ / плохой контакт в месте пайки.
    notify: [gui]
    gui_action: highlight_red    # подсветить окно датчика красным на обзорном dashboard
    side_effect: exclude_channel

  # --- Fault: кратковременные скачки (intermittent) ---
  sensor_fault_intermittent:
    alarm_type: threshold
    channel_group: uncalibrated
    check: fault_count_in_window
    range: [0.0, 350.0]
    window_s: 300                # последние 5 мин
    min_fault_count: 1           # хотя бы один скачок за окно
    level: WARNING
    message: >
      Датчик {channel}: обнаружены скачки за 0/350 K в последние 5 мин.
      Нестабильный контакт / деградация пайки.
    notify: [gui]
    gui_action: highlight_red

  # T11/T12 measurement thresholds removed 2026-05-02 — replaced by F-X v3
  # CooldownAlarm (predictor-based) and VacuumGuard.
  # See config/physical_alarms.yaml.

  # --- Fault detection for calibrated sensors (retained — not replaced by F-X v3) ---
  # Detects impossible raw values (<1K or >350K) indicating sensor hardware failure.
  # CooldownAlarm/VacuumGuard do not cover this — they evaluate physical state, not
  # sensor validity. This alarm remains a CRITICAL safety guard.
  calibrated_sensor_fault:
    alarm_type: threshold
    channels: [Т11, Т12]
    check: outside_range
    range: [1.0, 350.0]         # K — нижняя граница 1K (ниже калибровки DT-670)
    level: CRITICAL
    message: >
      Датчик {channel}: {value} K — fault (за пределами [1, 350] K).
      Аппаратный сбой или потеря контакта.
    notify: [gui, telegram, sound]
    side_effect: exclude_channel

  # --- Потеря данных ---
  data_stale_temperature:
    alarm_type: stale
    channel_group: all_temp
    timeout_s: 30
    level: WARNING
    message: "Нет данных от {instrument} > 30с."
    notify: [gui]

  data_loss_temperature:
    alarm_type: stale
    channel_group: all_temp
    timeout_s: 120
    level: CRITICAL
    message: "ПОЛНАЯ ПОТЕРЯ ДАННЫХ > 2 мин. Безопасность не гарантирована."
    notify: [gui, telegram, sound]

  data_loss_pressure:
    alarm_type: stale
    channel: P1
    timeout_s: 60
    level: CRITICAL
    message: "Нет данных давления > 60с. Вакуумный контроль потерян."
    notify: [gui, telegram, sound]

  # --- Keithley ---
  # B2 alarm-v1→v2 migration: channels corrected from bare "smua_power"/
  # "smub_power" to the real Reading.channel emitted by Keithley2604B
  # ("{instrument_name}/smua/power") — AlarmEvaluator/ChannelStateTracker
  # match channels by EXACT string, no regex/alias resolution, so the old
  # short names never matched anything and this alarm never fired. Ties
  # the rule to the current instruments.yaml instrument name ("Keithley_1");
  # rename here too if that instrument name ever changes.
  keithley_overpower:
    alarm_type: threshold
    channels: ["Keithley_1/smua/power", "Keithley_1/smub/power"]
    check: above
    threshold: 4.0               # W (лимит 5W, запас 20%)
    hysteresis: 0.5
    level: CRITICAL
    interlock: stop_source
    message: "Мощность {channel} > 4W."
    notify: [gui, telegram, sound]

  # --- Диск ---
  # B2: channel corrected from "system_disk_gb" (never published by anything)
  # to the real DiskMonitor channel "system/disk_free_gb"; hysteresis restored
  # to match the retired alarms.yaml v1 rule (same thresholds, no re-tuning).
  disk_space_warning:
    alarm_type: threshold
    channel: system/disk_free_gb
    check: below
    threshold: 10
    hysteresis: 2.0
    level: WARNING
    message: "Диск < 10 GB."
    notify: [gui]

  disk_space_critical:
    alarm_type: threshold
    channel: system/disk_free_gb
    check: below
    threshold: 2
    hysteresis: 0.5
    level: CRITICAL
    message: "Диск < 2 GB. Запись может прерваться."
    notify: [gui, telegram]

# ============================================================================
# ФАЗОЗАВИСИМЫЕ АЛАРМЫ
# ============================================================================
phase_alarms:

  vacuum:
    vacuum_insufficient:
      alarm_type: composite
      operator: AND
      conditions:
        - channel: P1
          check: above
          threshold: 1.0e-4
        - channel: phase_elapsed_s
          check: above
          threshold: 3600        # 60 мин
      level: WARNING
      message: "Не достигнут вакуум 1e-4 mbar за 60 мин."
      notify: [gui]

    vacuum_stall:
      alarm_type: rate
      channel: P1
      check: relative_rate_near_zero
      rate_threshold: 0.01       # |dP/P| < 1% за окно
      additional_condition:
        channel: P1
        check: above
        threshold: 1.0e-5
      level: INFO
      message: "Давление перестало падать при P > 1e-5."
      notify: [gui]

  cooldown:
    excessive_cooling_rate:
      alarm_type: rate
      channels: [Т11, Т12]
      check: rate_below
      threshold: -5.0            # K/мин (отрицательный = охлаждение)
      rate_window_s: 120
      level: WARNING
      message: "Скорость охлаждения {channel} > 5 K/мин ({value} K/мин)."
      notify: [gui, telegram]

  measurement:
    shield_warming:
      alarm_type: rate
      channel: Т12               # азотная плита — индикатор 1-й ступени (F-X: Т12=nitrogen plate)
      check: rate_above
      threshold: 0.5             # K/мин
      rate_window_s: 300
      level: WARNING
      message: "Азотная плита (Т12) нагревается при measurement."
      notify: [gui, telegram]

  warmup:
    excessive_warmup_rate:
      alarm_type: rate
      channels: [Т11, Т12]
      check: rate_above
      threshold: 5.0
      rate_window_s: 120
      level: WARNING
      message: "Скорость нагрева {channel} > 5 K/мин."
      notify: [gui, telegram]

# ============================================================================
# ИНТЕРЛОКИ — phantom-only entries для throttle protection.
#
# Большинство интерлоков живут в config/interlocks.yaml — это источник истины
# для runtime interlock engine. Housekeeping (adaptive_throttle) читает оба
# файла через load_protected_channel_patterns() и load_critical_channels_from_alarms_v3(),
# объединяя patterns для защиты safety-critical каналов от throttling.
#
# Секция ниже содержит только те интерлоки, чьи каналы НЕ покрываются regex
# patterns из config/interlocks.yaml — сейчас это только Keithley power каналы
# (smua_power, smub_power), которые не матчатся temperature-regex из interlocks.yaml.
#
# НЕ добавлять сюда дубликаты config/interlocks.yaml. Каналы Т1–Т12 уже
# защищены через regex patterns в interlocks.yaml.
# ============================================================================
interlocks:

  keithley_overpower_interlock:
    channels: [smua_power, smub_power]
    check: any_above
    threshold: 4.5               # W — жёстче аларма (4.0), мягче лимита (5.0)
    action: stop_source
