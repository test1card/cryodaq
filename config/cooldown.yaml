# Channel mapping (2026-05-07, post-C6 + F-ChannelLandmarks):
# Т11 — пассивная плита на 1-й ступени GM-cooler (~40K floor)
# Т12 — 2-я ступень GM-cooler, холодная точка (~2.9K floor)
# These are physically pinned (positionally fixed) channels.
# Other Т* channels are mobile per-experiment — never reference them here.
cooldown:
  enabled: true
  channel_cold: "Т12"
  channel_warm: "Т11"
  model_dir: "data/cooldown_model"
  detect:
    start_rate_threshold: -5.0
    start_confirm_minutes: 10
    end_T_cold_threshold: 6.0
    end_rate_threshold: 0.1
    end_confirm_minutes: 30
  predict_interval_s: 30
  rate_window_h: 1.5
  auto_ingest: true
  min_cooldown_hours: 10.0
  # v0.55.3 — quasi-steady regime tunables for SteadyStatePredictor.
  # Engine passes this sub-block as kwargs when constructing the
  # predictor inside CooldownService.
  steady_state:
    noise_floor_k: 0.05
    drift_threshold_k_per_h: 1.0
    window_s: 900.0
    update_interval_s: 10.0
    min_points: 30
    min_duration_s: 60.0
