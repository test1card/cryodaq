# Конфигурация системы безопасности CryoDAQ
#
# ВНИМАНИЕ: изменения в этом файле влияют на безопасность криогенного оборудования.
# Любые правки должны быть согласованы с ответственным инженером.

# Каналы, обязательные для разрешения работы нагревателя.
# Regex — если канал не обновляется в течение stale_timeout_s → FAULT.
critical_channels:
  - "Т1 .*"     # верхняя часть криостата
  - "Т7 .*"     # детектор

# Через сколько секунд без обновления критический канал считается устаревшим
stale_timeout_s: 10.0

# Таймаут heartbeat Keithley — если нет ответа дольше, → FAULT
heartbeat_timeout_s: 15.0

# Максимальный размер очереди безопасности. Переполнение → FAULT.
max_safety_backlog: 100

# Требуется ли подключённый Keithley для перехода в RUN.
# false только для mock-режима.
require_keithley_for_run: true

# Ограничения по скорости изменения температуры
rate_limits:
  max_dT_dt_K_per_min: 5.0

# Параметры восстановления после аварии
recovery:
  require_reason: true             # оператор обязан указать причину при acknowledge
  cooldown_before_rearm_s: 60.0   # минимум 60с после аварии до повторного запуска
