    poll_interval_s: 2.0
    channels:
      1: "Т1 Криостат верх"
      2: "Т2 Криостат низ"
      3: "Т3 Радиатор 1"
      4: "Т4 Радиатор 2"
      5: "Т5 Экран 77К"
      6: "Т6 Экран 4К"
      7: "Т7 Детектор"
      8: "Т8 Калибровка"

  - type: lakeshore_218s
    name: "LS218_2"
    resource: "GPIB0::14::INSTR"
    poll_interval_s: 2.0
    channels:
      1: "Т9 Компрессор вход"
      2: "Т10 Компрессор выход"
      3: "Т11 Теплообменник 1"
      4: "Т12 Теплообменник 2"
      5: "Т13 Труба подачи"
      6: "Т14 Труба возврата"
      7: "Т15 Вакуумный кожух"
      8: "Т16 Фланец"

  - type: lakeshore_218s
    name: "LS218_3"
    resource: "GPIB0::16::INSTR"
    poll_interval_s: 2.0
    channels:
      1: "Т17 Зеркало 1"
      2: "Т18 Зеркало 2"
      3: "Т19 Подвес"
      4: "Т20 Рама"
      5: "Т21 Резерв 1"
      6: "Т22 Резерв 2"
      7: "Т23 Резерв 3"
      8: "Т24 Резерв 4"

  - type: keithley_2604b
    name: "Keithley_1"
    resource: "USB0::0x05E6::0x2604::04052028::INSTR"
    poll_interval_s: 1.0

  - type: thyracont_vsp63d
    name: "VSP63D_1"
    resource: "COM3"
    baudrate: 9600
    poll_interval_s: 2.0

  # F-MultiLine Stage 1: Etalon MultiLine TCP/IP integration.
  # Operator override `host` and `channels` in instruments.local.yaml
  # for the actual lab PC. Defaults below are placeholders; the driver
  # returns [] on connect failure so the scheduler retries gracefully.
  #
  # v0.55.11 (F-MultiLineContinuous) — optional continuous-mode keys:
  #   mode: averaged | continuous       (default: averaged)
  #   target_rate_hz: <float>           (default: 1.0; only used when
  #                                      mode=continuous; sets the
  #                                      decimation rate for emitted
  #                                      Reading objects — burst capture
  #                                      bypasses decimation and stores
  #                                      every cycle in Parquet)
  # In averaged mode the driver continues to issue latestlengthvalid
  # per scheduler tick (request-response). Continuous mode spawns a
  # background listener after `startmeasnogui`; environment readings
  # arrive bundled inside each channeldata cycle (no separate
  # environmentdata polling).
  - type: etalon_multiline
    name: "MultiLine_1"
    host: "localhost"
    port: 2001
    channels: [1, 2, 3, 4]
    poll_interval_s: 2.0
    connect_timeout_s: 5.0
    read_timeout_s: 10.0
    mode: averaged
    target_rate_hz: 1.0

# Keithley 2604B TSP dead-man watchdog (firmware backstop below the host
# SafetyManager). Operator-selected mode (default off):
#
#   mode          host behaviour on connect
#   ------------  ------------------------------------------------------------
#   off (default) no TSP script; host SafetyManager is the sole authority;
#                 byte-identical command stream (zero firmware dependency)
#   best_effort   arm on connect; on arm failure log CRITICAL and continue
#                 host-only (fail-OPEN on the watchdog layer)
#   required      arm on connect; connect() raises ONLY when the backstop
#                 cannot be established (arm failure, incl. an unreadable latch)
#                 → instrument unavailable → SAFE_OFF held (fail-CLOSED). A
#                 read-back latched past-trip is logged CRITICAL and proceeds —
#                 it never blocks (arming clears the latch; outputs are already
#                 force-OFF'd on connect).
#
# Legacy alias: ``enabled: true`` maps to best_effort, ``enabled: false`` to
# off (mode wins if both are present).
#
# CAVEAT: the firmware run-mechanism (trigger.timer, non-blocking FIFO) is
# still bench-unverified — see tsp/cryodaq_wdog.lua. ``required`` gates only on
# host-observable arm success (incl. a readable latch), NOT on proven firmware
# timer behaviour.
keithley:
  watchdog:
    mode: "off"   # quote: bare off/on are YAML booleans
    timeout_s: 5.0

chamber:
  volume_l: 0.0  # OPERATOR: set actual chamber volume in litres
  leak_rate:
    enabled: true
    default_sample_window_s: 300.0
    warning_threshold_mbar_l_per_s: 1.0e-4
