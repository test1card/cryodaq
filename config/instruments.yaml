  - type: keithley_2604b
    name: "Keithley_1"
    resource: "USB0::0x05E6::0x2604::04052028::INSTR"
    poll_interval_s: 1.0

  - type: thyracont_vsp63d
    name: "VSP63D_1"
    resource: "COM3"
    baudrate: 9600
    poll_interval_s: 2.0

  # F-MultiLine Stage 1: Etalon MultiLine TCP/IP integration.
  # Operator override `host` and `channels` in instruments.local.yaml
  # for the actual lab PC. Defaults below are placeholders; the driver
  # returns [] on connect failure so the scheduler retries gracefully.
  #
  # v0.55.11 (F-MultiLineContinuous) — optional continuous-mode keys:
  #   mode: averaged | continuous       (default: averaged)
  #   target_rate_hz: <float>           (default: 1.0; only used when
  #                                      mode=continuous; sets the
  #                                      decimation rate for emitted
  #                                      Reading objects — burst capture
  #                                      bypasses decimation and stores
  #                                      every cycle in Parquet)
  # In averaged mode the driver continues to issue latestlengthvalid
  # per scheduler tick (request-response). Continuous mode spawns a
  # background listener after `startmeasnogui`; environment readings
  # arrive bundled inside each channeldata cycle (no separate
  # environmentdata polling).
  - type: etalon_multiline
    name: "MultiLine_1"
    host: "localhost"
    port: 2001
    channels: [1, 2, 3, 4]
    poll_interval_s: 2.0
    connect_timeout_s: 5.0
    read_timeout_s: 10.0
    mode: averaged
    target_rate_hz: 1.0

# Keithley 2604B TSP software late-pet checker below the host SafetyManager.
# Operator-selected mode (driver default off; this example opts into best_effort):
#
#   mode          host behaviour on connect
#   ------------  ------------------------------------------------------------
#   off (default) no TSP script; host SafetyManager is the sole authority;
#                 byte-identical command stream (zero firmware dependency)
#   best_effort   activate late-pet checking; log CRITICAL that it has ZERO
#                 full-host-death coverage; failures continue host-only
#   required      require literal cryodaq_wdog_autonomous == 1; current v3
#                 reports 0, so connect() raises → instrument unavailable →
#                 SAFE_OFF held (fail-CLOSED). A read-back prior-trip latch is
#                 preserved without upload; connect remains recovery-only and
#                 RUN is blocked until verified OFF + explicit operator ack.
#
# Legacy alias: ``enabled: true`` maps to best_effort, ``enabled: false`` to
# off (mode wins if both are present).
#
# The previous autonomous timer attempt was removed as documented-invalid, not
# merely bench-unverified. A true host-death OFF path needs a documented redesign
# and independent terminal V/I/P proof. Prefer an external latching cutout after
# common-cause analysis; an in-SMU design is only a bench hypothesis.
#
# The 5 W safety value is a host-only target cap. Instrument compliance
# (typically limitv=40 V, limiti=1 A) is a load/instrument operating envelope;
# it does not guarantee <=5 W or bound cumulative energy after host death.
keithley:
  watchdog:
    # best_effort activates only late-pet detection and logs the missing
    # autonomous protection. Use required only to fail closed until a separately
    # evidenced autonomous implementation exists; off disables the script.
    mode: "best_effort"   # quote: bare off/on are YAML booleans
    # Finite numeric seconds only, range [1, 300]. TSP os.time() has one-second
    # granularity and the Lua comparison is strict `>`: equality is not late
    # until the next elapsed second. Keep >= 2 * poll_interval_s to avoid a
    # normal slow poll causing a late-pet trip.
    timeout_s: 5.0

chamber:
  volume_l: 0.0  # OPERATOR: set actual chamber volume in litres
  leak_rate:
    enabled: true
    default_sample_window_s: 300.0
    # No live warning threshold exists: nothing reads a leak-rate threshold.
    # finalize() enforces only the volume precondition (raises ValueError when
    # chamber.volume_l <= 0 — see analytics/leak_rate.py).
