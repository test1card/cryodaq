# Shift handover configuration
#
# НЕ читается кодом — зарезервировано. Ни один загрузчик в src/ не открывает
# этот файл; shift handover работает через Гемма-команды (payload-дефолты
# в самой команде, не из YAML). Файл сохранён как заготовка на будущее.

periodic_interval_hours: 2
periodic_missed_timeout_minutes: 15

operators:
  - "Фоменко В.Н."

shift_channels:
  temperature: "Т2"
  pressure: "Давление"
