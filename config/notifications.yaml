# Конфигурация уведомлений CryoDAQ (ШАБЛОН)
# Реальный токен — в notifications.local.yaml (не коммитится в git)

telegram:
  bot_token: "YOUR_BOT_TOKEN_HERE"
  chat_id: 0
  send_cleared: true
  timeout_s: 10
  allowed_chat_ids: []

periodic_report:
  enabled: false
  report_interval_s: 1800
  chart_hours: 2.0
  include_channels: null

commands:
  enabled: false
  poll_interval_s: 2.0
