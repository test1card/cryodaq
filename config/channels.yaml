# CryoDAQ channels configuration.
#
# Поля:
#   name      — отображаемое имя канала в GUI
#   visible   — показывать ли канал на дашборде по умолчанию
#   is_cold   — относится ли канал к криогенной зоне.
#               Холодные каналы участвуют в расчёте T_min/T_max
#               в TopWatchBar persistent context strip.
#               Корпусные датчики (вакуумный кожух, фланец,
#               зеркала, рама) — НЕ холодные, всегда у room temp,
#               не должны влиять на индикатор криогенного состояния.
#   group     — группа для UI organization (криостат, компрессор,
#               оптика, резерв)
#
# Default if is_cold field absent: true (sensible default for
# a cryogenic system — assume new channels are cryogenic until
# explicitly marked otherwise).

channels:
  Т1:
    name: Криостат верх
    visible: true
    is_cold: true
    group: криостат
  Т2:
    name: Криостат низ
    visible: true
    is_cold: true
    group: криостат
  Т3:
    name: Радиатор 1
    visible: true
    is_cold: true
    group: криостат
