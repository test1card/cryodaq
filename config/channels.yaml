# Карта каналов CryoDAQ — лаборатория АКЦ ФИАН
#
# Реальное подключение (первый деплой, март 2026):
#   LS218_1 (GPIB0::12): каналы 1-7 подключены, канал 8 — нет датчика
#   LS218_2 (GPIB0::11): каналы 1-7 подключены, канал 8 — нет датчика
#   LS218_3 (GPIB0::13): не используется (нет датчиков)
#   Keithley 2604B (USB):  smua + smub
#   Thyracont VSM77DL (COM3, 115200): давление в криостате

channels:

