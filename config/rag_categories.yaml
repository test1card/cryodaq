# v0.55.6 — Knowledge Base sidebar predefined RAG queries.
#
# Each category drives one entry in the knowledge_base_panel's left
# sidebar. Selecting a category fires `rag.search` with `query` + `limit`,
# rendering snippet cards on the right pane.
#
# Customize per deployment by copying this file to
# config/rag_categories.local.yaml — the panel reads `.local.yaml` first
# and falls back to this file.
#
# v0.56.0 — labels translated to Russian (operator-facing surface);
# queries are bilingual (RU + EN keywords) because the corpus mixes
# Russian procedures and English equipment manuals. The qwen3-embedding
# model is multilingual and handles cross-language retrieval.

categories:
  - id: safety
    label: "📚 Безопасность"
    query: "безопасность аварийное вакуум криогенный"
    limit: 10
  - id: cryostat
    label: "❄️ Криостат"
    query: "криостат температура захолаживание"
    limit: 10
  - id: procedures
    label: "📋 Процедуры"
    query: "процедура захолаживание калибровка эксперимент"
    limit: 10
  - id: manuals
    label: "📖 Документация"
    query: "manual руководство instrument прибор сенсор"
    limit: 10
