__meta_name__: "Braun"
__meta_description__: "Светлая — кремовая продуктовая поверхность с геометрическими бордюрами и оливково-мховым акцентом. Немецкий индустриальный функционализм."

# Surfaces — hue 43–45° sat 25–27% (industrial product surface, не бумага)
BACKGROUND: "#ece8de"
SURFACE_PANEL: "#e0dbcc"
SURFACE_CARD: "#faf6ea"
SURFACE_ELEVATED: "#fffcf1"
SURFACE_SUNKEN: "#d4cdb8"
SURFACE_MUTED: "#e4dfcf"

# Borders — 2.42:1, Rams-характерная геометрическая линия
BORDER: "#a6a08e"
BORDER_SUBTLE: "#c8c0ab"

# Text — precise near-black, слегка тёплый (качественная печать на corporate surface)
FOREGROUND: "#151412"
TEXT_SECONDARY: "#4a4739"
MUTED_FOREGROUND: "#7a7664"
TEXT_DISABLED: "#afab97"

# Neutral interaction tokens (Phase III.A — decoupled from status semantics)
SELECTION_BG: "#e6e0d8"
FOCUS_RING: "#8a7d65"

# Accent — moss-olive (Phase III.A recalibrated from olive-moss #476f20.
# Prior hue 90° violated the ≥60° invariant vs STATUS_OK 143° at 53°.
# New hue ≈70° (yellow-olive): 73° from STATUS_OK, 37° from WARNING,
# satisfies both III.A ≥60°/STATUS_OK and ADR 001 ≥30°/all-status
# invariants. Keeps Braun-native industrial moss-olive feel.)
ACCENT: "#6a7530"
ACCENT_300: "#505720"
ACCENT_500: "#828e45"
ACCENT_600: "#a4ae6b"

# Text on colored backgrounds
ON_PRIMARY: "#ffffff"
ON_DESTRUCTIVE: "#ffffff"

# Status palette (LIGHT-SHIFTED — hue identical to dark, L decreased для AA на CARD)
# См. ADR 001: docs/design-system/adr/001-light-theme-status-unlock.md
STATUS_OK: "#2e6b45"
STATUS_WARNING: "#8c5a1c"
STATUS_CAUTION: "#9c4a2c"
STATUS_FAULT: "#a53838"
STATUS_INFO: "#355e94"
STATUS_STALE: "#4a4d58"
COLD_HIGHLIGHT: "#2f6876"
