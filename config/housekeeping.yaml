adaptive_throttle:
  enabled: true
  include_patterns:
    # Match both Cyrillic Т (U+0422) and Latin T (U+0054) to guard against
    # homoglyph regressions. Canonical runtime uses Cyrillic Т.
    - "^[TТ](?![1-8] ).*"
    - "pressure"
  exclude_patterns:
    - "^analytics/"
    - "^alarm/"
    - "^system/"
  stable_duration_s: 120.0
  max_interval_s: 30.0
  absolute_delta:
    default: 0.05
    K: 0.02
    mbar: 1.0e-5
    Pa: 1.0
  transition_holdoff_s: 30.0

retention:
  enabled: true
  interval_s: 3600.0
  compress_after_days: 14
  delete_compressed_after_days: 90
  dry_run: false

cold_rotation:
  enabled: true
  archive_dir: data/archive
  age_days: 30
  schedule_time: "03:00"
  zstd_compression_level: 3
