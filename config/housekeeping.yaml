adaptive_throttle:
  enabled: true
  include_patterns:
    # Match both Cyrillic Т (U+0422) and Latin T (U+0054) to guard against
    # homoglyph regressions. Canonical runtime uses Cyrillic Т.
    - "^[TТ](?![1-8] ).*"
    - "pressure"
  exclude_patterns:
    - "^analytics/"
    - "^alarm/"
    - "^system/"
  stable_duration_s: 120.0
  max_interval_s: 30.0
  absolute_delta:
    default: 0.05
    K: 0.02
    mbar: 1.0e-5
    Pa: 1.0
  transition_holdoff_s: 30.0

# Retention gzips aged daily DBs and later deletes the .gz. NOTE (F1): while
# cold_rotation.enabled is true, retention does NOT compress daily readings DBs
# — rotation owns their lifecycle (hot .db → zstd Parquet after age_days), and a
# data_YYYY-MM-DD.db.gz is invisible to every reader. compress_after_days below
# therefore only bites when rotation is off. The delete-compressed sweep still
# runs to clean any legacy/leftover .gz by its own age.
retention:
  enabled: true
  interval_s: 3600.0
  compress_after_days: 14
  delete_compressed_after_days: 90
  dry_run: false

# Cold rotation moves daily SQLite files older than age_days into zstd Parquet
# and unlinks the .db. LIVE by default: rotation runs once daily at
# schedule_time. Every historical reader — CSV/XLSX/HDF5 exports, report
# readings + operator_log, GUI readings_history, calibration fitter, both replay
# paths, bulk export — reads hot ∪ cold through ArchiveReader, so rotated days
# stay fully visible. This flag is the single kill-switch: enabled: false stops
# rotation and leaves all hot .db files in place. Recommended after the first
# rotation: one bench check of GUI history across a rotated day.
# Rotation also ingests legacy data_YYYY-MM-DD.db.gz files (daily DBs a prior
# retention pass compressed before the F1 guard existed): it decompresses to a
# temp file, archives through the normal Parquet path, then deletes the .gz.
cold_rotation:
  enabled: true
  archive_dir: data/archive
  age_days: 30
  schedule_time: "03:00"
  zstd_compression_level: 3
