agent:
  enabled: true
  brand_name: "Гемма"
  brand_emoji: "🤖"

  ollama:
    base_url: http://localhost:11434
    default_model: gemma4:e2b
    timeout_s: 60  # gemma4:e2b runs comfortably on M5 24GB; thinking-first still applies
    temperature: 0.3
    # num_ctx: 4096  # Uncomment to reduce context window for faster inference
    # Note: gemma4:e4b also pulled (~14GB) but doesn't fit on M5 alongside engine + GUI.
    # Switch to e4b only on dedicated GPU box (e.g. RTX with ≥16GB VRAM).

  triggers:
    alarm_fired:
      enabled: true
      min_level: WARNING
    experiment_finalize:
      enabled: true
    sensor_anomaly_critical:
      enabled: true
    shift_handover_request:
      enabled: true
    phase_transition_to_finalize:
      enabled: true
    periodic_report:
      enabled: true
      interval_minutes: 60
      skip_if_idle: true
      min_events_for_dispatch: 1

  outputs:
    telegram: true
    operator_log: true
    gui_insight_panel: true

  rate_limit:
    max_calls_per_hour: 60
    max_concurrent_inferences: 2

  slices:
    a_notification: true
    b_suggestion: true
    c_campaign_report: true

  audit:
    enabled: true
    retention_days: 90

  query:
    enabled: true
    intent_model: gemma4:e2b
    format_model: gemma4:e2b
    intent_temperature: 0.1
    format_temperature: 0.3
    intent_timeout_s: 15.0
    format_timeout_s: 30.0
    rate_limit:
      max_queries_per_chat_per_hour: 60
