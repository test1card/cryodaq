agent:
  enabled: true
  brand_name: "Гемма"
  brand_emoji: "🤖"

  ollama:
    base_url: http://localhost:11434
    default_model: gemma4:e4b
    timeout_s: 120  # gemma4:e4b thinking-first; cold-load ~40s, warm ~10s on RTX 5070 Ti 16GB
    temperature: 0.3
    num_ctx: 32768  # 32K context; fits 100% on GPU with ~2 GB vRAM headroom on RTX 5070 Ti 16GB
    # Deployment notes (verified 2026-05-15 on RTX 5070 Ti 16GB lab PC):
    #   e4b @ num_ctx=32768: 100% GPU, ~11 GB used, ~2 GB headroom, ~39 tok/s.
    #   26b @ num_ctx=16384: 41% CPU / 59% GPU split (model 17 GB > vRAM budget),
    #     only ~680 MiB headroom, degraded throughput. Not viable on 16 GB.
    #   M5 24GB (Mac dev): downgrade default_model к gemma4:e2b — e4b не fits
    #     alongside engine + GUI on Apple Silicon shared memory.

  triggers:
    alarm_fired:
      enabled: true
      min_level: WARNING
    experiment_finalize:
      enabled: true
    sensor_anomaly_critical:
      enabled: true
    shift_handover_request:
      enabled: true
    phase_transition_to_finalize:
      enabled: true
    periodic_report:
      enabled: true
      interval_minutes: 60
      skip_if_idle: true
      min_events_for_dispatch: 1

  outputs:
    telegram: true
    operator_log: true
    gui_insight_panel: true

  rate_limit:
    max_calls_per_hour: 60
    max_concurrent_inferences: 2

  query:
    enabled: true
    intent_model: gemma4:e4b
    format_model: gemma4:e4b
    intent_temperature: 0.1
    format_temperature: 0.3
    intent_timeout_s: 60.0  # 3× e2b default — absorbs e4b cold-load (~40s) + intent generation
    format_timeout_s: 90.0  # 2.25× e2b default — absorbs e4b cold-load + Russian format generation
    rate_limit:
      max_queries_per_chat_per_hour: 60

  slices:
    a_notification: true
    b_suggestion: true
    c_campaign_report: true

  audit:
    enabled: true
    retention_days: 90

  query:
    enabled: true
    intent_model: gemma4:e4b
    format_model: gemma4:e4b
    intent_temperature: 0.1
    format_temperature: 0.3
    intent_timeout_s: 60.0  # 3× e2b default — absorbs e4b cold-load (~40s) + intent generation
    format_timeout_s: 90.0  # 2.25× e2b default — absorbs e4b cold-load + Russian format generation
    rate_limit:
      max_queries_per_chat_per_hour: 60
