sensor_diagnostics:
  enabled: true
  update_interval_s: 10
  noise_window_s: 120
  drift_window_s: 600
  outlier_window_s: 300
  correlation_window_s: 600
  min_points: 10
  thresholds:
    noise_cold_K: 0.02        # T < 30K (DT-670 high sensitivity zone)
    noise_mid1_K: 0.05        # 30-100K
    noise_mid2_K: 0.1         # 100-200K
    noise_warm_K: 0.2         # T > 200K
    drift_K_per_min: 0.1      # absolute drift threshold
    outlier_sigma: 5.0        # outlier = deviation > 5σ from median
    correlation_min: 0.8      # flag uncorrelated below this
    health_warning: 50
    health_critical: 30
  correlation_groups:
    shield:    [Т1, Т2, Т3, Т4, Т5, Т6, Т7, Т8]
    cold:      [Т9, Т10, Т11, Т12, Т13, Т14]
    periphery: [Т15, Т16, Т17, Т18, Т19, Т20]

vacuum_trend:
  enabled: true
  window_s: 3600                           # data window for fitting (s)
  update_interval_s: 30                    # refit interval (s)
  min_points: 60                           # minimum points for fit
  min_points_combined: 200                 # minimum for 5-param combined model
  targets_mbar:
    - 1.0e-4
    - 1.0e-5
    - 1.0e-6
  anomaly_threshold_sigma: 3.0
  rising_sustained_s: 60                   # sustained rise before "rising" flag
  trend_threshold_log10_per_s: 1.0e-4     # d(log₁₀P)/dt threshold
  extrapolation_horizon_factor: 2.0       # extrapolate 2× window ahead
  pressure_channel: ""                     # auto-detect any mbar-unit reading
