sensor_diagnostics:
  enabled: true
  update_interval_s: 10
  noise_window_s: 120
  drift_window_s: 600
  outlier_window_s: 300
  correlation_window_s: 600
  min_points: 10
  thresholds:
    noise_cold_K: 0.02        # T < 30K (DT-670 high sensitivity zone)
    noise_mid1_K: 0.05        # 30-100K
    noise_mid2_K: 0.1         # 100-200K
    noise_warm_K: 0.2         # T > 200K
    drift_K_per_min: 0.1      # absolute drift threshold
    outlier_sigma: 5.0        # outlier = deviation > 5σ from median
    correlation_min: 0.8      # flag uncorrelated below this
    health_warning: 50
    health_critical: 30
  correlation_groups:
    shield:    [Т1, Т2, Т3, Т4, Т5, Т6, Т7, Т8]
    cold:      [Т9, Т10, Т11, Т12, Т13, Т14]
    periphery: [Т15, Т16, Т17, Т18, Т19, Т20]
  # F10 alarm publishing (sensor_diagnostics → alarm engine v2)
  alarm_publishing_enabled: true   # false → diagnostics display only, no alarms
  warning_duration_s: 300.0        # 5 min sustained anomaly → warning alarm
  critical_duration_s: 900.0       # 15 min sustained anomaly → critical alarm
  notify_telegram: false           # v0.55.5: sensor-health alarms route to GUI only;
                                    # hourly periodic_report carries condensed digest. Telegram
                                    # reserved for one-shot physics-critical events.
  cold_start_grace_s: 300.0        # v0.55.5: suppress sensor-diagnostic alarms during
                                    # the first N seconds after engine start. Buffer-fill
                                    # transients and mock reseed used to fire false anomalies
                                    # immediately on boot. Set to 0 to disable.
  # F20 notification polish
  aggregation_threshold: 3         # >N simultaneous events → single batch Telegram message
  escalation_cooldown_s: 120.0     # suppress re-notification within 2 min of last notify per channel

vacuum_trend:
  enabled: true
  window_s: 3600                           # data window for fitting (s)
  update_interval_s: 30                    # refit interval (s)
  min_points: 60                           # minimum points for fit
  min_points_combined: 200                 # minimum for 5-param combined model
  targets_mbar:
    - 1.0e-4
    - 1.0e-5
    - 1.0e-6
  anomaly_threshold_sigma: 3.0
  rising_sustained_s: 60                   # sustained rise before "rising" flag
  trend_threshold_log10_per_s: 1.0e-4     # d(log₁₀P)/dt threshold
  extrapolation_horizon_factor: 2.0       # extrapolate 2× window ahead
  pressure_channel: ""                     # auto-detect any mbar-unit reading

cooldown_baseline:
  # Task 8a: per-cooldown fingerprint + golden-baseline comparison (backend).
  # Additive and opt-in — when disabled the cooldown-end tap is a no-op.
  enabled: false
  base_threshold_K: 5.0                     # T_cold at/below this = "at base"
  pressure_channel: "VSP63D_1/pressure"     # A2: vacuum channel read at cooldown end for ultimate_vacuum
  thresholds:
    time_to_base_frac: 0.30                 # >+30% time-to-base vs golden -> degraded
    vacuum_decades: 1.0                     # >=1 decade worse ultimate vacuum -> degraded
