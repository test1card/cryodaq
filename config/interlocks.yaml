# Конфигурация блокировок CryoDAQ
#
# ВНИМАНИЕ: изменения в этом файле влияют на безопасность криогенного оборудования.
# Любые правки должны быть согласованы с ответственным инженером и задокументированы.
#
# Структура каждой блокировки:
#   name            — уникальный идентификатор (используется в API и логах)
#   description     — текстовое описание (отображается в интерфейсе при срабатывании)
#   channel_pattern — регулярное выражение для сопоставления с Reading.channel
#   threshold       — пороговое значение
#   comparison      — оператор: ">" (больше) или "<" (меньше)
#   action          — имя защитного действия: "emergency_off" или "stop_source"
#   cooldown_s      — минимальный интервал между повторными срабатываниями (секунды)

interlocks:

  # ─── Температурные блокировки криостата (каналы Т1–Т8) ──────────────────────
  - name: "overheat_cryostat"
    description: "Перегрев криостата — аварийное отключение нагревателя"
    channel_pattern: "Т[1-8] .*"
    threshold: 350.0
    comparison: ">"
    action: "emergency_off"
    cooldown_s: 10.0

  # ─── Температурные блокировки компрессорной линии (каналы Т9–Т12) ───────────
  - name: "overheat_compressor"
    description: "Перегрев компрессорной линии"
    channel_pattern: "Т(9|10|11|12) .*"
    threshold: 320.0
    comparison: ">"
    action: "emergency_off"
    cooldown_s: 10.0

  # ─── Защита детектора ────────────────────────────────────────────────────────
  # Примечание: фазовое условие (только в фазе measurement при активном источнике)
  # обеспечивается Alarm Engine v2 (detector_warmup_interlock в alarms_v3.yaml).
  # Данный интерлок — аппаратная страховка для любой фазы при T12 > 10 K.
  - name: "detector_warmup"
    description: "Нагрев детектора (T12) выше рабочей температуры — остановка источника"
    channel_pattern: "Т12 .*"
    threshold: 10.0
    comparison: ">"
    action: "stop_source"
    cooldown_s: 5.0

  # undercool_shield (T5 < 50 K) — УДАЛЁН: ложное срабатывание при штатном cooldown.
  # Физическое обоснование: см. alarm_tz_physics_v3.md §4.2 "Undercool false alarm".
