name: CryoDAQ CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    env:
      # Force CPython UTF-8 Mode so file I/O defaults to UTF-8 on Windows
      # (default is cp1252, which raises UnicodeError on the project's
      # Cyrillic fixtures/content). Matches the repo's UTF-8 canon.
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,web]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        # -v names the running test (a Qt segfault on Windows prints no
        # traceback); --timeout turns a hang into a faulthandler dump.
        # Retry up to 3x: PySide6 offscreen teardown on Windows has a residual
        # flaky access violation when re-polishing leaked widgets (the product
        # tests themselves pass). A clean run succeeds within a couple attempts.
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "=== pytest attempt $i / $max ==="
            pytest tests/ -x --tb=short -v --timeout=120 --timeout-method=thread
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "attempt $i failed with exit code $LASTEXITCODE"
          }
          Write-Host "all $max attempts failed"
          exit 1
