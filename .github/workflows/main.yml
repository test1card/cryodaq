name: CryoDAQ CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    env:
      # Force CPython UTF-8 Mode so file I/O defaults to UTF-8 on Windows
      # (default is cp1252, which raises UnicodeError on the project's
      # Cyrillic fixtures/content). Matches the repo's UTF-8 canon.
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,web]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        # -v so a hard crash (Qt/PySide segfault on Windows prints no traceback)
        # is preceded by the crashing test's nodeid as the last log line.
        # --timeout bounds hangs: a Windows test stuck forever (no traceback,
        # no crash) is turned into a readable failure with a faulthandler stack
        # dump naming the hung test. thread method works on Windows.
        run: pytest tests/ -x --tb=short -v --timeout=120 --timeout-method=thread
