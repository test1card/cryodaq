name: CryoDAQ CI

on:
  # Every commit on every branch (a merge to master is a push → covered too).
  push:
    branches: ["**"]
  # Every pull request into master — validates the simulated merge result.
  pull_request:
    branches: [master]
  # Manual "Run workflow" button in the Actions tab.
  workflow_dispatch:

# If you push again before CI finishes, cancel the superseded run to save
# runner minutes — EXCEPT on master, where every mainline commit is fully
# validated (never cancelled).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.suite }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    # Runner-level backstop: a native hang (Qt/C-level block) is invisible to
    # pytest's thread-method --timeout, so without this a stuck test runs to the
    # 6h default. 40 min is ~2x a healthy full run; a timeout here means "a test
    # hung" — read the faulthandler dumps in the log to find it.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        suite: [core, gui, agents, remaining]
    env:
      # Force CPython UTF-8 Mode so file I/O defaults to UTF-8 on Windows
      # (default is cp1252, which raises UnicodeError on the project's Cyrillic
      # fixtures/content). No-op on Linux/macOS. Matches the repo's UTF-8 canon.
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      CANDIDATE_ARTIFACT: cryodaq-candidate-${{ matrix.os }}-${{ matrix.suite }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          activate-environment: cryodaq
          environment-file: environment.yml
          channel-priority: strict

      - name: Install Qt offscreen system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-lock.txt
          python -m pip install -e . --no-deps --no-build-isolation
          python -m pip check

      - name: Verify safe SQLite runtime
        run: python -c "from cryodaq.storage._sqlite import is_safe_version, sqlite_version_info; version = sqlite_version_info(); assert is_safe_version(version), version; print('SQLite', version)"

      - name: Bind H4 reviewed interpreter alias (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ -e .venv ] || [ -L .venv ]; then
            echo "refusing to reuse an ambient .venv for H4 evidence" >&2
            exit 1
          fi
          mkdir -m 700 -p .venv/bin
          ln -s -- "$(command -v python)" .venv/bin/python
          python -c "from pathlib import Path; alias = Path('.venv/bin/python').resolve(strict=True); running = Path('/proc/self/exe').resolve(strict=True); assert alias == running, (alias, running)"

      - name: Run active exact-checkout remaining-only guards
        id: active-remaining
        if: matrix.suite == 'remaining'
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA:?}"
          git diff --quiet
          git diff --cached --quiet
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          python -m pytest \
            -p no:cacheprovider \
            --basetemp "${RUNNER_TEMP:?}/cryodaq-active-remaining-pytest" \
            tests/docs/test_docs_freshness.py \
            tests/test_claudemd_index.py \
            tests/scripts/test_soak_mock_stack_runner.py::test_controlled_environment_genuinely_collects_strict_exact_six \
            tests/scripts/test_soak_mock_stack_runner.py::test_controlled_environment_genuinely_executes_strict_exact_six \
            --tb=short -v --timeout=120 --timeout-method=thread
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA:?}"
          git diff --quiet
          git diff --cached --quiet
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Lint
        if: matrix.suite == 'remaining'
        run: ruff check src/ tests/

      - name: Check formatting of changed Python files
        if: matrix.suite == 'remaining'
        run: |
          set -euo pipefail
          # Reviewed debt boundary: everything changed after this commit must
          # be formatted.  Missing/squashed ancestry fails closed and requires
          # an explicit baseline migration instead of silently skipping files.
          FORMAT_BASE=db8849b573309453f25bc42adbf4b55cd0ce400b
          test "$(git cat-file -t "$FORMAT_BASE")" = commit
          git merge-base --is-ancestor "$FORMAT_BASE" HEAD

          changed_file="${RUNNER_TEMP:?}/cryodaq-format-${GITHUB_RUN_ID:-local}-${GITHUB_JOB:-job}.paths"
          trap 'rm -f "$changed_file"' EXIT
          git diff --name-only --diff-filter=ACMR -z "$FORMAT_BASE"...HEAD -- '*.py' >"$changed_file"

          if [[ -s "$changed_file" ]]; then
            # Bounded batches avoid the Windows CreateProcess command-line
            # limit while preserving arbitrary Git-valid path names.
            xargs -0 -n 100 python -m ruff format --check -- <"$changed_file"
          else
            echo "No changed Python files to format-check."
          fi

      - name: Check requirements-lock drift
        if: matrix.suite == 'remaining'
        # The frozen Windows build installs transitive deps from
        # requirements-lock.txt then install with --no-deps and
        # --no-build-isolation. Any
        # top-level dep missing from the lock is absent from the bundle.
        run: python scripts/check_lock_drift.py

      - name: Run app-palette tests (isolated)
        if: ${{ false }}
        # test_app_palette mutates the *global* QApplication stylesheet. Run in
        # its own process so there are no leaked widgets from earlier tests to
        # re-polish — re-polishing a large accumulated widget tree under the
        # Windows offscreen platform deterministically access-violates in
        # teardown. In isolation these tests pass cleanly. Harmless on Linux.
        run: pytest tests/gui/test_app_palette.py --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run operator ownership tests (isolated)
        if: ${{ false }}
        # These tests intentionally delete owned Qt children and wait for
        # queued button activation to prove fail-closed behavior. In the
        # monolithic GUI process, either operation also drains deferred
        # QGraphicsScene teardown left by unrelated pyqtgraph tests; PySide can
        # then crash natively before the ownership assertion runs. A fresh
        # process retains every assertion while removing that cross-file Qt
        # lifetime contamination.
        run: pytest tests/gui/shell/operator_components/test_freshness_and_card.py tests/gui/shell/views/test_operator_display.py --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run core tests
        if: ${{ false }}
        run: pytest tests/core tests/health tests/engine_wiring --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run GUI tests
        if: ${{ false }}
        # -v names the running test (a Qt segfault on Windows prints no
        # traceback); --timeout turns a hang into a faulthandler dump. Keep the
        # partition running after assertion failures so one red run reports the
        # complete failure set. The job-level timeout above backstops native
        # hangs that pytest's thread timeout cannot kill.
        run: pytest tests/gui --deselect tests/gui/test_app_palette.py --deselect tests/gui/shell/operator_components/test_freshness_and_card.py --deselect tests/gui/shell/views/test_operator_display.py --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run agent and reporting tests
        if: ${{ false }}
        run: pytest tests/agents tests/periodic tests/reporting tests/notifications --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run remaining tests
        if: ${{ false }}
        # This complement keeps new top-level test areas covered by default.
        # Named shards are ignored here so every non-isolated test runs once.
        run: pytest tests/ --ignore=tests/core --ignore=tests/health --ignore=tests/engine_wiring --ignore=tests/gui --ignore=tests/agents --ignore=tests/periodic --ignore=tests/reporting --ignore=tests/notifications --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run exact exported candidate suite
        id: candidate
        continue-on-error: true
        run: |
          python -m tools.ci_candidate_evidence run \
            --repository "${GITHUB_WORKSPACE:?}" \
            --revision "${GITHUB_SHA:?}" \
            --suite "${{ matrix.suite }}" \
            --destination "${RUNNER_TEMP:?}/cryodaq-candidate" \
            --output "${RUNNER_TEMP:?}/cryodaq-candidate-evidence" \
            --artifact-name "${CANDIDATE_ARTIFACT:?}"

      - name: Upload exact candidate execution bundle
        id: candidate-upload
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: ${{ runner.temp }}/cryodaq-candidate-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Attest uploaded candidate artifact
        if: always() && steps.candidate-upload.outcome == 'success'
        run: |
          python -m tools.ci_candidate_evidence attest \
            --bundle "${RUNNER_TEMP:?}/cryodaq-candidate-evidence" \
            --output "${RUNNER_TEMP:?}/cryodaq-candidate-attestation/artifact-attestation.json" \
            --artifact-name "${CANDIDATE_ARTIFACT:?}" \
            --artifact-id "${{ steps.candidate-upload.outputs.artifact-id }}" \
            --artifact-digest "${{ steps.candidate-upload.outputs.artifact-digest }}"

      - name: Upload exact candidate artifact attestation
        id: candidate-attestation-upload
        if: always() && steps.candidate-upload.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}-attestation
          path: ${{ runner.temp }}/cryodaq-candidate-attestation/artifact-attestation.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce exact candidate execution and evidence publication
        if: always()
        run: |
          if test "${{ matrix.suite }}" = remaining; then
            test "${{ steps.active-remaining.outcome }}" = success
          else
            test "${{ steps.active-remaining.outcome }}" = skipped
          fi
          test "${{ steps.candidate.outcome }}" = success
          test "${{ steps.candidate-upload.outcome }}" = success
          test "${{ steps.candidate-attestation-upload.outcome }}" = success
