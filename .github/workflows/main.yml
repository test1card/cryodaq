name: CryoDAQ CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    env:
      # Force CPython UTF-8 Mode so file I/O defaults to UTF-8 on Windows
      # (default is cp1252, which raises UnicodeError on the project's
      # Cyrillic fixtures/content). Matches the repo's UTF-8 canon.
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,web]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run app-palette tests (isolated)
        # test_app_palette mutates the *global* QApplication stylesheet. Run in
        # its own process so there are no leaked widgets from earlier tests to
        # re-polish — re-polishing a large accumulated widget tree under the
        # Windows offscreen platform deterministically access-violates in
        # teardown. In isolation these tests pass cleanly.
        run: pytest tests/gui/test_app_palette.py --tb=short -v --timeout=120 --timeout-method=thread

      - name: Run tests
        # -v names the running test (a Qt segfault on Windows prints no
        # traceback); --timeout turns a hang into a faulthandler dump.
        run: pytest tests/ --deselect tests/gui/test_app_palette.py -x --tb=short -v --timeout=120 --timeout-method=thread
