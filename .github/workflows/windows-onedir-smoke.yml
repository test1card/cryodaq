name: CryoDAQ Windows ONEDIR Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/windows-onedir-smoke.yml"
      - "build_scripts/**"
      - "config/**"
      - "plugins/**"
      - "requirements-lock.txt"
      - "pyproject.toml"
      - "scripts/check_lock_drift.py"
      - "src/**"
      - "tsp/**"
      - "LICENSE"
      - "tests/test_frozen_entry.py"
      - "tests/test_pyinstaller_spec.py"
      - "tests/test_windows_onedir_smoke_contract.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  windows-onedir:
    name: real Windows ONEDIR build and smoke
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      PYTHONUTF8: "1"
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install exact locked dependencies and project
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -r requirements-lock.txt
          python -m pip install --disable-pip-version-check . --no-deps
          python scripts/check_lock_drift.py

      - name: Build and seed the real ONEDIR bundle
        shell: pwsh
        run: |
          python -m PyInstaller build_scripts/cryodaq.spec --clean --noconfirm
          python build_scripts/post_build.py
          if (-not (Test-Path -LiteralPath "dist/CryoDAQ/CryoDAQ.exe" -PathType Leaf)) {
            throw "PyInstaller did not produce dist/CryoDAQ/CryoDAQ.exe"
          }

      - name: Reject required frozen-runtime missing-module warnings
        shell: pwsh
        run: >-
          python build_scripts/windows_onedir_smoke.py check-warnings
          --warn-file build/cryodaq/warn-cryodaq.txt
          --evidence-file build/windows-smoke/pyinstaller-warnings.json

      - name: Execute the built EXE smoke matrix
        shell: pwsh
        run: >-
          python build_scripts/windows_onedir_smoke.py smoke
          --dist-dir dist/CryoDAQ
          --evidence-dir build/windows-smoke

      - name: Upload strict smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CryoDAQ-windows-onedir-smoke-${{ github.sha }}
          path: build/windows-smoke/
          if-no-files-found: error
          retention-days: 30

      - name: Upload tested ONEDIR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CryoDAQ-windows-onedir-${{ github.sha }}
          path: dist/CryoDAQ/
          if-no-files-found: error
          retention-days: 14
