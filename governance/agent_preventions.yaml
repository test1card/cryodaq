records:
  - id: GOVERNANCE-PREVENTION-MAP-001
    status: open
    scope: repository
    authority_source: AGENTS.md
    applies_to: All confirmed developer-agent mistakes and their review dispositions.
    classification: governance_escape
    correction_owner: reviewer
    guard_owner: primary
    disposition_owner: reviewer
    consequence: Confirmed mistakes can disappear from handoffs or close without executable prevention.
    invariant: Every prevention ID maps to a rule, collectable guard, default CI job, and immutable evidence state.
    rule_refs:
      - AGENTS.md#primary-ai-first-rule-mistake-to-enforcement
      - docs/adr/003-governance-as-enforcement.md#enforcement-registry
    guards:
      - node: tests/governance/test_agent_preventions.py::test_registry_schema_ids_and_references_are_exact
