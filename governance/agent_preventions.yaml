  - id: GOVERNANCE-ARTIFACT-TRACKING-001
    status: open
    scope: repository
    authority_source: AGENTS.md#primary-ai-first-rule-mistake-to-enforcement
    applies_to: Every canonical policy, ADR, schema, registry, validator, and reviewed governance commit.
