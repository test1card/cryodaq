  - id: MONTANA-INTEGRATION-SEQUENCE-001
    status: open
    scope: campaign_local
    authority_source: ROADMAP.md#montana-correction-programme-after-exact-object-review-2026-07-22
    applies_to: feat/montana-phase-a and review/montana-cli-corrections-staging during the Montana completion campaign.
    expires_when: Final reviewed Montana campaign disposition is recorded after the master integration gate.
    expiry_disposition: Bind the final reviewed Montana commit/tree, master integration commit/tree, disposition evidence digest, and expiry timestamp before status becomes expired.
    classification: campaign_coordination
    correction_owner: reviewer
    guard_owner: primary
    disposition_owner: reviewer
    consequence: Integrating unreviewed CLI content, freezing a proposal before its effective lane-owned affected guards are collectable and green, requiring unrelated other-lane guards, or confusing slice, integration, PR, and publication states can contaminate or deadlock the candidate.
    invariant: A lane proposal freeze requires its exact changed-path and known-finding closure resolved through the active campaign edit-owner map; combined Montana requires the union plus integration guards; final PR/master requires the complete candidate closure; CLI remains separate until exact-object approval; integration and master merge each receive a separate freeze and review.
    campaign_edit_owner_overrides:
      - edit_owner: cli
        path: src/cryodaq/core/experiment.py
      - edit_owner: cli
        path: src/cryodaq/engine.py
      - edit_owner: reviewer
        path: tests/core/test_experiment_adversarial.py
      - edit_owner: reviewer
        path: tests/core/test_experiment_commands.py
      - edit_owner: reviewer
        path: tests/gui/shell/views/test_assistant_insight_panel.py
      - edit_owner: cli
        path: src/cryodaq/replay_engine/replay_experiment_stub.py
      - edit_owner: cli
        path: src/cryodaq/replay_engine/server.py
      - edit_owner: reviewer
        path: tests/notifications/test_telegram.py
      - edit_owner: reviewer
        path: tests/replay_engine/test_replay_phases.py
    campaign_guard_authorship:
      author: reviewer
      path_source: all_exact_guard_nodes_in_registry
      implementation_worker_guard_authoring: forbidden
      reviewer_product_authoring: forbidden
      freeze_requires_worker_test_path_manifest: true
      independent_guard_review: required
      expires_when: Combined Montana candidate receives its final campaign disposition.
    proposal_guard_scope:
      combined_montana: Union of accepted primary and CLI lane manifests plus integration and governance guards on the exact combined tree.
      final_candidate: Complete candidate-required registry and default-CI closure on the exact PR/master object.
      lane_completion: Union of accepted tranches plus every still-assigned obligation for that effective campaign editor.
      lane_proposal: Exact changed-path and known-finding closure whose effective campaign editor is the proposing lane.
    rule_refs:
      - ROADMAP.md#montana-correction-programme-after-exact-object-review-2026-07-22
