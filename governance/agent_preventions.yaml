schema_version: 2
registry_id: AI-FIRST-PREVENTION-MAP-001
status_definitions:
  open: Required correction or evidence is incomplete.
  reopened: A previously disposed invariant lost, weakened, skipped, or misbound enforcement.
  closed: Invariant and guard are green with immutable reviewer-bound evidence.
  expired: Campaign-local coordination no longer applies after its named expiry and immutable final disposition.
scope_definitions:
  repository: Universal developer-agent, evidence, review, or publication invariant.
  product_contract: Durable CryoDAQ runtime or test invariant independent of the current campaign mechanics.
  campaign_local: Temporary branch, worktree, lane, ordering, freeze, or completion rule with an explicit expiry.
ownership_semantics:
  correction_owner: Default durable role that maintains the affected runtime, governance, evidence, or integration state outside an active campaign override.
  guard_owner: Default durable implementation role that maintains the machine-testable guard outside an active campaign override.
  disposition_owner: Reviewer; no author self-closes its correction or guard.
  campaign_edit_owner_override: Exact campaign-local path or node assignment that supersedes durable owners for authoring only and expires with the campaign.
  edit_owner_precedence: Active exact campaign override, then durable owner; every active path and guard node resolves to exactly one editor.
  allowed_owners:
    - reviewer
    - primary
    - cli
    - each_agent
campaign_expiry_semantics:
  required_terminal_status: expired
  immutable_final_disposition: required
  history_retention: permanent_non_authoritative
  may_authorize_after_expiry: false
durable_product_contract_authority: docs/adr/003-governance-as-enforcement.md#enforcement-registry
policy_refs:
  - AGENTS.md#primary-ai-first-rule-mistake-to-enforcement
  - docs/adr/003-governance-as-enforcement.md
  - docs/MONTANA_IMPLEMENTATION_AGENT_SPEC.md#3-slice-and-review-protocol
default_ci_jobs:
  core:
    - test (ubuntu-latest, core)
    - test (windows-latest, core)
  gui:
    - test (ubuntu-latest, gui)
    - test (windows-latest, gui)
  agents:
    - test (ubuntu-latest, agents)
    - test (windows-latest, agents)
  remaining:
    - test (ubuntu-latest, remaining)
    - test (windows-latest, remaining)

false_green_pair_semantics:
  status: required_and_independent
  scope: required
  correction_owner: inherited_from_runtime_prevention_id
  guard_owner: inherited_from_runtime_prevention_id
  disposition_owner: reviewer
  close_requires_runtime_closed: true
  close_requires_immutable_red_and_green_evidence: true
  guard_removed_skipped_xfailed_deselected_or_nondefault: reopen

